<!DOCTYPE html>
<html>
<head>
    <title>Flask DevOps Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        input {
            padding: 10px;
            width: 300px;
            margin-right: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        li {
            padding: 8px;
            background: white;
            margin: 5px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Flask DevOps Project</h1>
    <p>By Aryan Patil | DevOps engineer</p>
    <form method="POST">
        <input type="text" name="name" placeholder="Enter a name" required>
        <button type="submit">Add Name</button>
    </form>
    <h2>Names List:</h2>
    <ul>
        {% for name in names %}
            <li>{{ name[0] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
